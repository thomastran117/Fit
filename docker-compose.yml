services:
  mysql:
    image: mysql:8.4
    container_name: rent-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rent
      MYSQL_USER: rent
      MYSQL_PASSWORD: rent
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: rent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: rent-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rent-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rent-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8040
      DATABASE_URL: mysql://rent:rent@mysql:3306/rent
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_ENABLED: "true"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_POSTINGS_INDEX: postings
      RABBITMQ_URL: amqp://rabbitmq:5672
      FRONTEND_URL: http://localhost:3040
      APP_BASE_URL: http://localhost:3040
      GMAIL_USER: change-me@example.com
      GMAIL_APP_PASSWORD: change-me
      ACCESS_TOKEN_SECRET: change-me-access-token-secret
      REFRESH_TOKEN_SECRET: change-me-refresh-token-secret
    ports:
      - "8040:8040"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8040
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
        NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ""
        NEXT_PUBLIC_MICROSOFT_OAUTH_CLIENT_ID: ""
        NEXT_PUBLIC_MICROSOFT_OAUTH_TENANT: consumers
    container_name: rent-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3040
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8040
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
      NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ""
      NEXT_PUBLIC_MICROSOFT_OAUTH_CLIENT_ID: ""
      NEXT_PUBLIC_MICROSOFT_OAUTH_TENANT: consumers
    ports:
      - "3040:3040"

volumes:
  mysql_data:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:
