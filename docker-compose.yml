x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile

x-mcp-build: &mcp-build
  context: ./mcp
  dockerfile: Dockerfile

x-backend-environment: &backend-environment
  NODE_ENV: development
  DATABASE_URL: mysql://rent:rent@mysql:3306/rent
  REDIS_HOST: redis
  REDIS_PORT: 6379
  ELASTICSEARCH_ENABLED: "true"
  ELASTICSEARCH_URL: http://elasticsearch:9200
  ELASTICSEARCH_POSTINGS_INDEX: postings
  RABBITMQ_URL: amqp://rabbitmq:5672
  FRONTEND_URL: http://localhost:3040
  APP_BASE_URL: http://localhost:3040
  GMAIL_USER: change-me@example.com
  GMAIL_APP_PASSWORD: change-me
  ACCESS_TOKEN_SECRET: change-me-access-token-secret
  REFRESH_TOKEN_SECRET: change-me-refresh-token-secret
  PERSONAL_ACCESS_TOKEN_SECRET: change-me-personal-access-token-secret
  SQUARE_ACCESS_TOKEN: change-me-square-access-token
  SQUARE_LOCATION_ID: change-me-square-location-id
  SQUARE_WEBHOOK_SIGNATURE_KEY: change-me-square-webhook-signature-key
  SQUARE_WEBHOOK_NOTIFICATION_URL: http://localhost:8040/payments/webhooks/square

x-mcp-environment: &mcp-environment
  NODE_ENV: development
  RENTIFY_API_BASE_URL: http://backend:8040
  RENTIFY_API_TIMEOUT_MS: 5000
  RENTIFY_PAT: ${RENTIFY_PAT:-}

x-api-depends-on: &api-depends-on
  backend-migrate:
    condition: service_completed_successfully
  mysql:
    condition: service_healthy
  redis:
    condition: service_healthy
  elasticsearch:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy

x-db-worker-depends-on: &db-worker-depends-on
  backend-migrate:
    condition: service_completed_successfully
  mysql:
    condition: service_healthy

x-search-worker-depends-on: &search-worker-depends-on
  backend-migrate:
    condition: service_completed_successfully
  mysql:
    condition: service_healthy
  elasticsearch:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy

x-rabbitmq-worker-depends-on: &rabbitmq-worker-depends-on
  rabbitmq:
    condition: service_healthy

services:
  mysql:
    image: mysql:8.4
    container_name: rent-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rent
      MYSQL_USER: rent
      MYSQL_PASSWORD: rent
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: rent-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: rent-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9201:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rent-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  backend-migrate:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-backend-migrate
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    environment: *backend-environment
    command: ["npx", "prisma", "migrate", "deploy"]

  backend:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-backend
    restart: unless-stopped
    depends_on: *api-depends-on
    environment:
      <<: *backend-environment
      PORT: 8040
    command: ["node", "dist/server.js"]
    ports:
      - "8040:8040"

  analytics-worker:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-analytics-worker
    restart: unless-stopped
    depends_on: *db-worker-depends-on
    environment: *backend-environment
    command: ["node", "dist/workers/analytics/postings-analytics.worker.js"]

  booking-expiry-worker:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-booking-expiry-worker
    restart: unless-stopped
    depends_on: *db-worker-depends-on
    environment: *backend-environment
    command: ["node", "dist/workers/bookings/booking-expiry.worker.js"]

  email-worker:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-email-worker
    restart: unless-stopped
    depends_on: *rabbitmq-worker-depends-on
    environment: *backend-environment
    command: ["node", "dist/workers/email/email-delivery.worker.js"]

  payment-retry-worker:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-payment-retry-worker
    restart: unless-stopped
    depends_on: *db-worker-depends-on
    environment: *backend-environment
    command: ["node", "dist/workers/payments/payment-retry.worker.js"]

  payment-repair-worker:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-payment-repair-worker
    restart: unless-stopped
    depends_on: *db-worker-depends-on
    environment: *backend-environment
    command: ["node", "dist/workers/payments/payment-repair.worker.js"]

  payout-release-worker:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-payout-release-worker
    restart: unless-stopped
    depends_on: *db-worker-depends-on
    environment: *backend-environment
    command: ["node", "dist/workers/payments/payout-release.worker.js"]

  search-maintainer-worker:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-search-maintainer-worker
    restart: unless-stopped
    depends_on: *search-worker-depends-on
    environment: *backend-environment
    command: ["node", "dist/workers/search/search-maintainer.worker.js"]

  search-indexer-worker:
    build: *backend-build
    image: rent-backend:local
    container_name: rent-search-indexer-worker
    restart: unless-stopped
    depends_on: *search-worker-depends-on
    environment: *backend-environment
    command: ["node", "dist/workers/search/search-indexer.worker.js"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8040
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
        NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ""
        NEXT_PUBLIC_MICROSOFT_OAUTH_CLIENT_ID: ""
        NEXT_PUBLIC_MICROSOFT_OAUTH_TENANT: consumers
    container_name: rent-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3040
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8040
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
      NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID: ""
      NEXT_PUBLIC_MICROSOFT_OAUTH_CLIENT_ID: ""
      NEXT_PUBLIC_MICROSOFT_OAUTH_TENANT: consumers
    ports:
      - "3040:3040"

  mcp:
    build: *mcp-build
    image: rent-mcp:local
    container_name: rent-mcp
    profiles: ["mcp"]
    restart: "no"
    depends_on:
      backend:
        condition: service_started
    environment: *mcp-environment
    stdin_open: true

volumes:
  mysql_data:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:
